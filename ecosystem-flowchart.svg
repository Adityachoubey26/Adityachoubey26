    <text x="251" y="275" fill="#EAEAEA" font-size="15">▹ GraphEra — Founder</text>
    <text x="251" y="305" fill="#EAEAEA" font-size="15">▹ TechEra — Founder</text>
    <text x="251" y="335" fill="#EAEAEA" font-size="15">▹ Product Building</text>
    <text x="251" y="365" fill="#EAEAEA" font-size="15">▹ Brand Growth</text>
