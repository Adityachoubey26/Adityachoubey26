<svg width="100%" viewBox="0 0 1400 1020" xmlns="http://www.w3.org/2000/svg" font-family="Consolas, 'Courier New', monospace">

  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#1a0000"/>
      <stop offset="100%" stop-color="#050000"/>
    </radialGradient>

    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF0000"/>
      <stop offset="100%" stop-color="#660000"/>
    </linearGradient>

    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="1400" height="1020" rx="24" fill="url(#bgGrad)"/>
  <rect x="4" y="4" width="1392" height="1012" rx="20" fill="none" stroke="#FF0000" stroke-opacity="0.25" stroke-width="2"/>

  <!-- ============ CONNECTOR LINES ============ -->
  <g stroke="url(#lineGrad)" stroke-width="3" filter="url(#softGlow)" opacity="0.85">
    <line x1="700" y1="430" x2="700" y2="235"/>
    <line x1="765" y1="455" x2="1029" y2="310"/>
    <line x1="765" y1="545" x2="1029" y2="690"/>
    <line x1="700" y1="570" x2="700" y2="765"/>
    <line x1="635" y1="545" x2="371" y2="690"/>
    <line x1="635" y1="455" x2="371" y2="310"/>
  </g>

  <!-- ============ CENTER NODE ============ -->
  <circle cx="700" cy="500" r="95" fill="#0D0000" stroke="#FF0000" stroke-width="3" filter="url(#glow)"/>
  <circle cx="700" cy="500" r="95" fill="none" stroke="#FF4444" stroke-width="1" stroke-opacity="0.4"/>
  <text x="700" y="490" text-anchor="middle" fill="#FF0000" font-size="20" font-weight="bold" filter="url(#glow)">🚀 ADITYA</text>
  <text x="700" y="516" text-anchor="middle" fill="#FF6666" font-size="20" font-weight="bold" filter="url(#glow)">CHOUBEY</text>

  <!-- ============ NODE TEMPLATE STYLES ============ -->
  <!-- DEVELOPMENT (Top) -->
  <g>
    <rect x="540" y="5" width="320" height="230" rx="14" fill="#0D0000" stroke="#FF0000" stroke-width="2" filter="url(#glow)"/>
    <text x="700" y="40" text-anchor="middle" fill="#FF1A1A" font-size="22" font-weight="bold">💻 Development</text>
    <line x1="565" y1="52" x2="835" y2="52" stroke="#FF0000" stroke-opacity="0.4" stroke-width="1"/>
    <text x="580" y="80" fill="#EAEAEA" font-size="15">▹ HTML / CSS / JS</text>
    <text x="580" y="108" fill="#EAEAEA" font-size="15">▹ React.js</text>
    <text x="580" y="136" fill="#EAEAEA" font-size="15">▹ Java</text>
    <text x="580" y="164" fill="#EAEAEA" font-size="15">▹ Python</text>
    <text x="580" y="192" fill="#EAEAEA" font-size="15">▹ MongoDB &amp; MySQL</text>
    <text x="580" y="218" fill="#EAEAEA" font-size="15">▹ Git &amp; GitHub</text>
  </g>

  <!-- DESIGN (Top Right) -->
