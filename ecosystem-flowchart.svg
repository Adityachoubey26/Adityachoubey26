    <text x="909" y="305" fill="#EAEAEA" font-size="15">▹ UI / UX Design</text>
    <text x="909" y="335" fill="#EAEAEA" font-size="15">▹ Brand Identity</text>
    <text x="909" y="365" fill="#EAEAEA" font-size="15">▹ GraphEra Projects</text>
  </g>

  <!-- PROJECTS (Bottom Right) -->
