    <rect x="869" y="575" width="320" height="230" rx="14" fill="#0D0000" stroke="#FF0000" stroke-width="2" filter="url(#glow)"/>
    <text x="1029" y="610" text-anchor="middle" fill="#FF1A1A" font-size="22" font-weight="bold">🛠️ Projects</text>
    <line x1="894" y1="622" x2="1164" y2="622" stroke="#FF0000" stroke-opacity="0.4" stroke-width="1"/>
