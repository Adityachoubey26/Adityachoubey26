    <text x="909" y="685" fill="#EAEAEA" font-size="15">▹ Personal Portfolio</text>
    <text x="909" y="715" fill="#EAEAEA" font-size="15">▹ GraphEra Platform</text>
  </g>

  <!-- FUTURE GOALS (Bottom) -->
