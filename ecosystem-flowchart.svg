    <text x="700" y="820" text-anchor="middle" fill="#FF1A1A" font-size="22" font-weight="bold">🎯 Future Goals</text>
    <line x1="565" y1="832" x2="835" y2="832" stroke="#FF0000" stroke-opacity="0.4" stroke-width="1"/>
    <text x="580" y="865" fill="#EAEAEA" font-size="15">▹ Software Internship</text>
    <text x="580" y="895" fill="#EAEAEA" font-size="15">▹ Full Stack Mastery</text>
    <text x="580" y="925" fill="#EAEAEA" font-size="15">▹ Open Source</text>
    <text x="580" y="953" fill="#EAEAEA" font-size="15">▹ Impactful Products</text>
  </g>

  <!-- COMMUNITY (Bottom Left) -->
  <g>
    <rect x="211" y="575" width="320" height="230" rx="14" fill="#0D0000" stroke="#FF0000" stroke-width="2" filter="url(#glow)"/>
    <text x="371" y="610" text-anchor="middle" fill="#FF1A1A" font-size="22" font-weight="bold">🌐 Community</text>
    <line x1="236" y1="622" x2="506" y2="622" stroke="#FF0000" stroke-opacity="0.4" stroke-width="1"/>
    <text x="251" y="655" fill="#EAEAEA" font-size="15">▹ TechEra Community</text>
    <text x="251" y="685" fill="#EAEAEA" font-size="15">▹ Networking</text>
